<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 850" font-family="Segoe UI, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="stxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="frameNumGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="etxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#fecaca"/>
    </linearGradient>
    <linearGradient id="csGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="100%" style="stop-color:#e9d5ff"/>
    </linearGradient>
    <linearGradient id="crlfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="850" height="50" rx="8" fill="url(#headerGrad)"/>
  <text x="425" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="600">ASTM E1381 数据帧格式 (Frame Format)</text>

  <!-- 帧结构图标题 -->
  <text x="40" y="82" fill="#1e293b" font-size="15" font-weight="600">标准帧结构</text>
  <line x1="40" y1="90" x2="160" y2="90" stroke="#2563eb" stroke-width="2"/>

  <!-- 帧结构图 -->
  <g transform="translate(40, 105)">
    <!-- STX -->
    <rect x="0" y="0" width="70" height="55" rx="6" fill="url(#stxGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="35" y="22" text-anchor="middle" fill="#92400e" font-size="14" font-weight="700">STX</text>
    <text x="35" y="40" text-anchor="middle" fill="#b45309" font-size="10">0x02</text>

    <!-- 帧号 -->
    <rect x="80" y="0" width="70" height="55" rx="6" fill="url(#frameNumGrad)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="115" y="22" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="700">N</text>
    <text x="115" y="40" text-anchor="middle" fill="#2563eb" font-size="10">帧号 0-9</text>

    <!-- 数据区 -->
    <rect x="160" y="0" width="310" height="55" rx="6" fill="url(#dataGrad)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
    <text x="315" y="22" text-anchor="middle" fill="#166534" font-size="14" font-weight="700">DATA</text>
    <text x="315" y="40" text-anchor="middle" fill="#16a34a" font-size="10">记录数据 (CR 分隔)</text>

    <!-- ETX -->
    <rect x="480" y="0" width="70" height="55" rx="6" fill="url(#etxGrad)" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="515" y="22" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="700">ETX</text>
    <text x="515" y="40" text-anchor="middle" fill="#dc2626" font-size="10">0x03</text>

    <!-- 校验和 -->
    <rect x="560" y="0" width="80" height="55" rx="6" fill="url(#csGrad)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="22" text-anchor="middle" fill="#5b21b6" font-size="14" font-weight="700">CS</text>
    <text x="600" y="40" text-anchor="middle" fill="#7c3aed" font-size="10">校验和(hex)</text>

    <!-- CR LF -->
    <rect x="650" y="0" width="80" height="55" rx="6" fill="url(#crlfGrad)" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <text x="690" y="22" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">CR LF</text>
    <text x="690" y="40" text-anchor="middle" fill="#64748b" font-size="10">0D 0A</text>

    <!-- 连接箭头 -->
    <path d="M72,28 L78,28" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
    <path d="M152,28 L158,28" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
    <path d="M472,28 L478,28" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
    <path d="M552,28 L558,28" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
    <path d="M642,28 L648,28" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  </g>

  <!-- 校验和计算说明 -->
  <rect x="40" y="190" width="770" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="215" fill="#1e293b" font-size="13" font-weight="600">📐 校验和计算</text>
  <text x="60" y="235" fill="#475569" font-size="12">范围：从帧号(N)到 ETX(含)所有字节之和</text>
  <text x="60" y="252" fill="#475569" font-size="12" font-family="Consolas, monospace">checksum = (N + data[0] + ... + ETX) mod 256</text>

  <!-- 记录格式示例标题 -->
  <text x="40" y="295" fill="#1e293b" font-size="15" font-weight="600">记录格式示例</text>
  <line x1="40" y1="303" x2="160" y2="303" stroke="#2563eb" stroke-width="2"/>

  <!-- H 记录 - 头信息 -->
  <g transform="translate(40, 315)">
    <rect x="0" y="0" width="770" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#f59e0b"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">H</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Header Record - 消息头</text>
    <text x="75" y="47" fill="#475569" font-size="11" font-family="Consolas, monospace">H|\^&amp;|发送方ID^位置|消息类型|处理ID|版本|时间|...</text>
    <text x="580" y="47" fill="#6b7280" font-size="10">消息起始标识</text>
  </g>

  <!-- P 记录 - 患者信息 -->
  <g transform="translate(40, 395)">
    <rect x="0" y="0" width="770" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#3b82f6"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="700">P</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Patient Record - 患者信息</text>
    <text x="75" y="47" fill="#475569" font-size="11" font-family="Consolas, monospace">P|序号|患者ID^名称|生日|性别|医生|科室|...</text>
    <text x="580" y="47" fill="#6b7280" font-size="10">患者标识信息</text>
  </g>

  <!-- O 记录 - 检验申请 -->
  <g transform="translate(40, 475)">
    <rect x="0" y="0" width="770" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#22c55e"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#166534" font-size="13" font-weight="700">O</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Order Record - 检验申请</text>
    <text x="75" y="47" fill="#475569" font-size="11" font-family="Consolas, monospace">O|序号|样本ID|项目^试剂|优先级|采集时间|样本类型|...</text>
    <text x="580" y="47" fill="#6b7280" font-size="10">检测项目信息</text>
  </g>

  <!-- R 记录 - 检验结果 -->
  <g transform="translate(40, 555)">
    <rect x="0" y="0" width="770" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#ec4899"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#9d174d" font-size="13" font-weight="700">R</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Result Record - 检验结果</text>
    <text x="75" y="47" fill="#475569" font-size="11" font-family="Consolas, monospace">R|序号|项目|值|单位|参考低|参考高|时间|状态|...</text>
    <text x="580" y="47" fill="#6b7280" font-size="10">检测数值结果</text>
  </g>

  <!-- Q 记录 - 查询请求 (双向) -->
  <g transform="translate(40, 635)">
    <rect x="0" y="0" width="770" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="70" rx="4" fill="#a855f7"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#6b21a8" font-size="13" font-weight="700">Q</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Request Record - 查询请求 (双向模式)</text>
    <text x="75" y="47" fill="#475569" font-size="11" font-family="Consolas, monospace">Q|序号|起始范围^样本|结束范围|时间起|时间止|查询类型|...</text>
    <text x="580" y="47" fill="#6b7280" font-size="10">LIS 查询仪器</text>
  </g>

  <!-- L 记录 - 结束标记 -->
  <g transform="translate(40, 715)">
    <rect x="0" y="0" width="770" height="55" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="55" rx="4" fill="#64748b"/>
    <rect x="15" y="10" width="50" height="24" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="40" y="27" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">L</text>
    <text x="75" y="27" fill="#1e293b" font-size="13" font-weight="500">Terminator Record - 结束标记</text>
    <text x="75" y="42" fill="#475569" font-size="11" font-family="Consolas, monospace">L|序号|N  (N=正常完成, I=无信息, Q=错误终止)</text>
  </g>

  <!-- 底部说明 -->
  <rect x="40" y="785" width="770" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="425" y="805" text-anchor="middle" fill="#475569" font-size="12">帧号 0-9 循环 | ETB(0x17) 分帧 | ETX(0x03) 末帧 | 字段分隔: | ^ \ &amp;</text>
  <text x="425" y="822" text-anchor="middle" fill="#6b7280" font-size="11">每条记录以 CR(0x0D) 分隔，字段以 | 分隔，组件以 ^ 分隔</text>
</svg>
