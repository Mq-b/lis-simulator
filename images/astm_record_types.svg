<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="Segoe UI, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="100%" style="stop-color:#e9d5ff"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#fed7aa"/>
    </linearGradient>
    <linearGradient id="lGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="900" height="50" rx="8" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="18" font-weight="600">ASTM E1394 数据区记录格式 (Data Records)</text>

  <!-- 记录类型卡片 -->
  <g transform="translate(50, 70)">
    <!-- H 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#hGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#f59e0b"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">H</text>
    <text x="75" y="30" fill="#92400e" font-size="15" font-weight="600">Header Record</text>
    <text x="75" y="48" fill="#b45309" font-size="12">消息头 - 标识消息开始</text>
    <text x="15" y="72" fill="#78350f" font-size="11" font-family="Consolas, monospace">H|\^&amp;|发送方|消息类型|版本|时间</text>
  </g>

  <g transform="translate(470, 70)">
    <!-- P 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#pGrad)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#3b82f6"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">P</text>
    <text x="75" y="30" fill="#1e40af" font-size="15" font-weight="600">Patient Record</text>
    <text x="75" y="48" fill="#2563eb" font-size="12">患者信息 - 患者标识和基本信息</text>
    <text x="15" y="72" fill="#1e3a8a" font-size="11" font-family="Consolas, monospace">P|序号|ID|姓名|年龄|性别|...</text>
  </g>

  <g transform="translate(50, 175)">
    <!-- O 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#oGrad)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#22c55e"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">O</text>
    <text x="75" y="30" fill="#166534" font-size="15" font-weight="600">Order Record</text>
    <text x="75" y="48" fill="#16a34a" font-size="12">检验申请 - 测试项目信息</text>
    <text x="15" y="72" fill="#14532d" font-size="11" font-family="Consolas, monospace">O|序号|样本ID|项目|...|样本类型</text>
  </g>

  <g transform="translate(470, 175)">
    <!-- R 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#rGrad)" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#ec4899"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">R</text>
    <text x="75" y="30" fill="#9d174d" font-size="15" font-weight="600">Result Record</text>
    <text x="75" y="48" fill="#db2777" font-size="12">检验结果 - 检测值和参考范围</text>
    <text x="15" y="72" fill="#831843" font-size="11" font-family="Consolas, monospace">R|序号|项目|值|单位|低|高|时间|标志</text>
  </g>

  <g transform="translate(50, 280)">
    <!-- Q 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#qGrad)" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#a855f7"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">Q</text>
    <text x="75" y="30" fill="#6b21a8" font-size="15" font-weight="600">Request Record</text>
    <text x="75" y="48" fill="#9333ea" font-size="12">查询请求 - 双向模式查询（可选）</text>
    <text x="15" y="72" fill="#581c87" font-size="11" font-family="Consolas, monospace">Q|序号|起始|结束|时间起|时间止|类型</text>
  </g>

  <g transform="translate(470, 280)">
    <!-- C 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#cGrad)" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#f97316"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">C</text>
    <text x="75" y="30" fill="#9a3412" font-size="15" font-weight="600">Comment Record</text>
    <text x="75" y="48" fill="#ea580c" font-size="12">备注 - 附加说明信息（可选）</text>
    <text x="15" y="72" fill="#7c2d12" font-size="11" font-family="Consolas, monospace">C|序号|来源|备注内容|类型</text>
  </g>

  <g transform="translate(260, 385)">
    <!-- L 记录 -->
    <rect x="0" y="0" width="380" height="85" rx="8" fill="url(#lGrad)" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <rect x="15" y="15" width="45" height="30" rx="4" fill="#64748b"/>
    <text x="37" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700">L</text>
    <text x="75" y="30" fill="#334155" font-size="15" font-weight="600">Terminator Record</text>
    <text x="75" y="48" fill="#475569" font-size="12">结束标记 - 标识消息结束</text>
    <text x="15" y="72" fill="#1e293b" font-size="11" font-family="Consolas, monospace">L|序号|N  (N=正常, I=无信息, Q=错误)</text>
  </g>

  <!-- 消息类型说明 -->
  <rect x="50" y="500" width="800" height="230" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="70" y="530" fill="#1e293b" font-size="16" font-weight="600">📋 典型数据区示例</text>

  <g transform="translate(70, 550)">
    <rect x="0" y="0" width="760" height="165" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="20" y="25" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#fbbf24">H|</tspan><tspan fill="#86efac">\^&amp;|R3M^0|PR|RL_V1.3|20250518103000</tspan>
    </text>
    <text x="20" y="50" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#93c5fd">P|</tspan><tspan fill="#86efac">1|660467|张三|36|M|C||李四|骨科</tspan>
    </text>
    <text x="20" y="75" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#86efac">O|</tspan><tspan fill="#86efac">1|5868739000|NT-proBNP||1|20250418185452|Blood|U</tspan>
    </text>
    <text x="20" y="100" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#f9a8d4">R|</tspan><tspan fill="#86efac">1|NT-proBNP|125.3|pg/mL|0|125|20250418190000|N|</tspan>
    </text>
    <text x="20" y="125" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#f9a8d4">R|</tspan><tspan fill="#86efac">2|cTnI|0.03|ng/mL|0|0.15|20250418190000|N|</tspan>
    </text>
    <text x="20" y="150" fill="#a5f3fc" font-size="12" font-family="Consolas, monospace">
      <tspan fill="#94a3b8">L|</tspan><tspan fill="#86efac">1|N</tspan>
    </text>
  </g>
</svg>
