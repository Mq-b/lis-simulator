<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bg)"/>

  <!-- LIS 文字 -->
  <text x="128" y="160" font-family="Arial, sans-serif" font-weight="bold" font-size="100" fill="white" text-anchor="middle" letter-spacing="8">LIS</text>

  <!-- 底部小字 -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)" text-anchor="middle">Simulator</text>
</svg>