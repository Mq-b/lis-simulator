name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: 构建 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
        include:
          - os: windows-latest
            artifact_name: lis-simulator-windows-x64
          - os: ubuntu-22.04
            artifact_name: lis-simulator-linux-x64
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release

      - name: 打包 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/lis-simulator.exe, settings -DestinationPath lis-simulator-windows-x64.zip

      - name: 打包 (Linux)
        if: runner.os == 'Linux'
        run: zip -r lis-simulator-linux-x64.zip target/release/lis-simulator settings/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    name: 发布 Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: lis-simulator-windows-x64

      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          name: lis-simulator-linux-x64

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lis-simulator-windows-x64.zip
            lis-simulator-linux-x64.zip
          generate_release_notes: true
